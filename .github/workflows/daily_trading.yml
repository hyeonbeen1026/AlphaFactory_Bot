name: Alpha Factory Live Trader

on:
  #schedule: #사용시 주석지우기
    # 매주 월~금, UTC 13:00 (한국 시간 밤 10시)에 실행
  #- cron: '00 13 * * 1-5' #사용시 주석지우기
  workflow_dispatch: # 수동 강제 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 저장소 코드 불러오기
        uses: actions/checkout@v4

      - name: 🐍 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: 📦 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy alpaca-py requests lxml pytz

      - name: 🚀 실전 매매 봇 (live_trader.py) 실행
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}      
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}  
        run: python live_trader.py
