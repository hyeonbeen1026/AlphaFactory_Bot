name: Weekend Alpha Factory (Auto-Miner)

on:
  #schedule: #사용시 주석지우기
    # 매주 토요일 UTC 00:00 (한국 시간 토요일 오전 9시)에 실행
    #- cron: '0 0 * * 6' #사용시 주석지우기
  workflow_dispatch: # 수동 테스트용 버튼

# 💡 [핵심] 봇이 코드를 수정하고 Push할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  mine-alphas:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 저장소 코드 불러오기
        uses: actions/checkout@v4

      - name: 🐍 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          # main_factory.py를 돌리기 위해 필요한 모든 패키지 설치
          pip install pandas numpy requests lxml pytz pyarrow fastparquet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🧬 진화 알고리즘 공장(main_factory.py) 가동
        env:
          # 혹시 팩토리 안에서 데이터를 받을 때 API 키가 필요할까봐 추가
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python -u main_factory.py

      - name: 💾 발굴된 엘리트 전략 CSV를 깃허브에 자동 Push
        run: |
          # 봇 계정으로 로그인 (GitHub Actions 기본 제공 봇)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 새롭게 덮어씌워진 csv 파일 추가
          git add alpha_factory_top_strategies.csv
          
          # 변경사항이 있을 때만 Commit 하고 Push (에러 방지용 안전장치)
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-Update: 이번 주 새로운 알파 전략 발굴 완료!" && git push)
